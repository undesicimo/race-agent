services:
  db:
    image: timescale/timescaledb:latest-pg17
    container_name: sim-telemetry-db
    environment:
      POSTGRES_DB: sim_telemetry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - sim_telemetry_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sim_telemetry"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sim_telemetry_db:
