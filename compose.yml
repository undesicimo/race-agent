services:
  db:
    image: timescale/timescaledb:latest-pg17
    container_name: race-agent-db
    environment:
      POSTGRES_DB: race_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - race_agent_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d race_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  race_agent_db:
