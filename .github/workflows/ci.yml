name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  windows-collector:
    name: Windows collector integrity
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Build release exe
        run: cargo build -p collector-windows --release

      - name: Verify Windows collector exe
        shell: pwsh
        run: ./scripts/verify-windows-collector.ps1 -ExePath target\release\collector-windows.exe -ReportDir dist

      - name: Upload integrity reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-collector-integrity
          if-no-files-found: ignore
          path: |
            dist/*.manifest
            dist/*.sha256
            dist/collector-windows-*.txt
