name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple

  build-windows-collector:
    name: Build Windows collector
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Build release exe
        run: cargo build -p collector-windows --release

      - name: Verify Windows collector exe
        shell: pwsh
        run: ./scripts/verify-windows-collector.ps1 -ExePath target\release\collector-windows.exe -ReportDir dist

      - name: Package release assets
        shell: pwsh
        run: |
          $version = "${{ needs.release-please.outputs.version }}"
          $dist = "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $exe = "target\release\collector-windows.exe"
          $zip = "$dist\race-agent-collector-windows-v$version.zip"
          Copy-Item $exe "$dist\collector-windows.exe"
          Compress-Archive -Path "$dist\collector-windows.exe" -DestinationPath $zip -Force

          Get-FileHash $zip -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  $(Split-Path $_.Path -Leaf)" } |
            Set-Content "$dist\SHA256SUMS.txt"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: race-agent-collector-windows
          path: |
            dist/*.zip
            dist/*.manifest
            dist/*.sha256
            dist/collector-windows-*.txt
            dist/SHA256SUMS.txt

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
